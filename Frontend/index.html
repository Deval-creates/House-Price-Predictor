<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input[type="number"],
        input[type="range"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        input[type="range"] {
            padding: 0;
            height: 8px;
            background: #e0e0e0;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        .range-value {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.9em;
            margin-left: 10px;
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            text-align: center;
            color: white;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .result .price {
            font-size: 2.5em;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 House Price Predictor</h1>
        
        <form id="predictionForm">
            <div class="form-group">
                <label for="location">Location</label>
                <select id="location" required>
                    <option value="">Select a location</option>
                    <option value="San Francisco">San Francisco</option>
                    <option value="Los Angeles">Los Angeles</option>
                    <option value="San Diego">San Diego</option>
                    <option value="Sacramento">Sacramento</option>
                    <option value="Fresno">Fresno</option>
                    <option value="Oakland">Oakland</option>
                    <option value="San Jose">San Jose</option>
                    <option value="Long Beach">Long Beach</option>
                    <option value="Bakersfield">Bakersfield</option>
                    <option value="Anaheim">Anaheim</option>
                </select>
            </div>

            <div class="form-group">
                <label for="totalRooms">
                    Total Rooms 
                    <span class="range-value" id="roomsValue">5000</span>
                </label>
                <input type="range" id="totalRooms" min="2" max="39320" value="5000" step="1">
            </div>

            <div class="form-group">
                <label for="totalBedrooms">
                    Total Bedrooms 
                    <span class="range-value" id="bedroomsValue">1000</span>
                </label>
                <input type="range" id="totalBedrooms" min="1" max="6445" value="1000" step="1">
            </div>

            <div class="form-group">
                <label for="population">
                    Population 
                    <span class="range-value" id="populationValue">2000</span>
                </label>
                <input type="range" id="population" min="3" max="35682" value="2000" step="1">
            </div>

            <div class="form-group">
                <label for="medianIncome">Median Income (in tens of thousands)</label>
                <input type="number" id="medianIncome" min="0.4999" max="15.0001" step="0.0001" value="3.5" required>
            </div>

            <div class="form-group">
                <label for="oceanProximity">Ocean Proximity</label>
                <select id="oceanProximity" required>
                    <option value="">Select proximity</option>
                    <option value="<1H OCEAN">&lt;1H OCEAN</option>
                    <option value="INLAND">INLAND</option>
                    <option value="NEAR BAY">NEAR BAY</option>
                    <option value="NEAR OCEAN">NEAR OCEAN</option>
                    <option value="ISLAND">ISLAND</option>
                </select>
            </div>

            <button type="submit">Predict House Price</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Calculating prediction...</p>
        </div>

        <div class="result" id="result">
            <h2>Predicted House Price</h2>
            <div class="price" id="predictedPrice">$0</div>
        </div>
    </div>

    <script>
        // Update range values in real-time
        const totalRooms = document.getElementById('totalRooms');
        const roomsValue = document.getElementById('roomsValue');
        totalRooms.addEventListener('input', (e) => {
            roomsValue.textContent = e.target.value;
        });

        const totalBedrooms = document.getElementById('totalBedrooms');
        const bedroomsValue = document.getElementById('bedroomsValue');
        totalBedrooms.addEventListener('input', (e) => {
            bedroomsValue.textContent = e.target.value;
        });

        const population = document.getElementById('population');
        const populationValue = document.getElementById('populationValue');
        population.addEventListener('input', (e) => {
            populationValue.textContent = e.target.value;
        });

        // Form submission
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const predictedPrice = document.getElementById('predictedPrice');

            // Show loading, hide result
            loading.classList.add('show');
            result.classList.remove('show');

            const formData = {
                location: document.getElementById('location').value,
                total_rooms: parseFloat(document.getElementById('totalRooms').value),
                total_bedrooms: parseFloat(document.getElementById('totalBedrooms').value),
                population: parseFloat(document.getElementById('population').value),
                median_income: parseFloat(document.getElementById('medianIncome').value),
                ocean_proximity: document.getElementById('oceanProximity').value
            };

            try {
                const response = await fetch('http://localhost:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) {
                    throw new Error('Prediction failed');
                }

                const data = await response.json();
                
                // Format price with commas
                const formattedPrice = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(data.price);

                predictedPrice.textContent = formattedPrice;
                
                // Hide loading, show result
                loading.classList.remove('show');
                result.classList.add('show');

            } catch (error) {
                loading.classList.remove('show');
                alert('Error: ' + error.message + '\n\nMake sure the backend server is running on http://localhost:8000');
            }
        });
    </script>
</body>
</html>
